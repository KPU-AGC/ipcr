version: "2"
run:
  issues-exit-code: 1
  tests: true
linters:
  enable:
    - gocritic
    - misspell
    - prealloc
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Remove
        - (*bufio.Writer).Flush
  exclusions:
    generated: lax
    paths:
      - core
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - core
      - third_party$
      - builtin$
      - examples$
